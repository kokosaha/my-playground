# GitLab CE @ Docker Compose
# 配套文档: docs/01-gitlab/01-docker-install-plan.md
# 数据目录: 使用 Docker named volumes（避免 macOS bind mount 导致 Unix socket ENOTSUP/502）
# 使用前: 执行 scripts/check-gitlab-deps.sh 检查依赖。

services:
  gitlab:
    image: gitlab/gitlab-ce:17.9.5-ce.0
    container_name: gitlab
    restart: always
    hostname: localhost
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8080'
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        gitlab_rails['time_zone'] = 'Asia/Shanghai'
        gitlab_rails['gitlab_shell_ssh_port'] = 2222
    ports:
      - "8080:80"
      - "2222:22"
    volumes:
      - "gitlab_config:/etc/gitlab"
      - "gitlab_logs:/var/log/gitlab"
      - "gitlab_data:/var/opt/gitlab"
    shm_size: "256m"

volumes:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
