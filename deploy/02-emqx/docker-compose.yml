services:
  emqx:
    image: emqx/emqx:5.7.1
    container_name: emqx_v57
    restart: always
    ports:
      - "1883:1883"      # MQTT
      - "18083:18083"    # Dashboard
    environment:
      - "EMQX_NODE__NAME=emqx@127.0.0.1"
      - "EMQX_DASHBOARD__PASSWORD=${EMQX_ADMIN_PWD}" # 从 .env 读取
    volumes:
      - ./data:/opt/emqx/data
      - ./log:/opt/emqx/log
    networks:
      - emqx-net

networks:
  emqx-net:
    driver: bridge
